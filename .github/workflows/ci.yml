name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Install sandbox prerequisites (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y bubblewrap build-essential

      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test
      - run: RUSTFLAGS="-D warnings" cargo check --target aarch64-apple-darwin
